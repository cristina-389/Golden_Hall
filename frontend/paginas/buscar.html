<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hall | Buscar Espaços</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="logado-layout dark">

    <main class="page-content">
        
        <section class="central-busca">
            <h2>Encontre o Espaço Perfeito</h2>
            <p class="section-subtitle">Ex: "um espaço para fazer festa de casamento na cidade de americana"</p>
            
            <div class="busca-container-box">
                <div class="busca-linha-principal">
                    <i class="bi bi-search icone-busca"></i>
                    <input type="text" id="input-busca" placeholder="O que você está procurando hoje?">
                    <button class="btn btn-gold btn-pesquisar" onclick="filtrarEspacos()">Buscar</button>
                </div>
            </div>
        </section>

        <section class="resultados-busca">
            <div class="cards">
                
                <div class="card" data-tags="casamento americana salaoluxo premium">
                    <img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3?q=80&w=600&auto=format&fit=crop" alt="Salão Premium">
                    <div class="card-content">
                        <h3>Salão Golden Luxo</h3>
                        <p>Casamento • Americana - SP</p>
                        <p>Até 300 pessoas</p>
                        <span class="price">R$ 2.500</span>
                        <button onclick="location.href='chacara-golden.html'">Ver detalhes</button>
                    </div>
                </div>

                <div class="card" data-tags="aniversario casamento caieiras chacara natureza">
                    <img src="https://images.unsplash.com/photo-1527529482837-4698179dc6ce?q=80&w=600&auto=format&fit=crop" alt="Chácara Golden">
                    <div class="card-content">
                        <h3>Chácara Golden</h3>
                        <p>Aniversário/Casamento • Caieiras - SP</p>
                        <p>Até 150 pessoas</p>
                        <span class="price">R$ 1.800</span>
                        <button onclick="location.href='chacara-golden.html'">Ver detalhes</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <nav class="barra-navegacao-inferior">
        <a href="../index-logado.html" class="item-nav">
            <span class="bi bi-house icone"></span>
            <span class="texto">Início</span>
        </a>
        <a href="buscar.html" class="item-nav ativo">
            <span class="bi bi-search icone"></span>
            <span class="texto">Buscar</span>
        </a>
        <a href="favoritos.html" class="item-nav">
            <span class="bi bi-heart icone"></span>
            <span class="texto">Favoritos</span>
        </a>
        <a href="reservas.html" class="item-nav">
            <span class="bi bi-calendar-event icone"></span>
            <span class="texto">Reservas</span>
        </a>
        <a href="perfil.html" class="item-nav">
            <span class="bi bi-person icone"></span>
            <span class="texto">Perfil</span>
        </a>
    </nav>

    <script src="../js/script.js"></script>
</body>
</html>
