<div id="modal-cadastro" class="modal-overlay">
    <div class="modal-box">
        <button class="fechar-modal" onclick="fecharModal()">&times;</button>
        
        <h2>Criar sua Conta</h2>
        <div class="linha-dourada-form"></div>
        <p class="subtitulo-form">Preencha os campos para acessar o painel exclusivo.</p>
        
        <form action="#" method="POST" id="form-cadastro">
            <div class="form-grid">
                
                <div class="input-grupo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="input-grupo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seuemail@gmail.com" required>
                </div>

                <div class="input-grupo col-total"> <label for="telefone">Telefone / WhatsApp</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>
                </div>

                <div class="input-grupo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                </div>

                <div class="input-grupo">
                    <label for="confirmar-senha">Confirmar Senha</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="••••••••" required>
                </div>

                <div class="checkbox-grupo">
                    <input type="checkbox" id="termos" name="termos" required>
                    <label for="termos">Aceito os Termos e Políticas do Golden Hall</label>
                </div>

                <button type="submit" class="btn btn-gold btn-bloco">Cadastrar</button>
            </div>
        </form>

        <p class="alternativa-form">
            Já tem uma conta? <a href="#" onclick="alternarParaLogin()">Faça login aqui</a>
        </p>
    </div>
</div>
